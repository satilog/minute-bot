services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minute-bot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - SAVE_AUDIO_TO_STORAGE=true
      # Processing
      - WHISPER_MODEL=base
      - LANGUAGE=en
      - TRANSCRIPTION_BUFFER_DURATION=5.0
      - DIARIZATION_BUFFER_DURATION=30.0
      - MIN_SPEAKERS=1
      - MAX_SPEAKERS=10
      # HuggingFace
      - HF_TOKEN=${HF_TOKEN:-}
      # LLM (Anthropic)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-claude-haiku-4-5-20251001}
      # Server
      - PORT=5000
      - DEBUG=false
      # Audio (PipeWire/PulseAudio passthrough)
      - PULSE_SERVER=unix:/run/pulse/native
    volumes:
      - whisper_cache:/root/.cache/whisper
      - huggingface_cache:/root/.cache/huggingface
      - /run/user/1000/pulse/native:/run/pulse/native
    depends_on:
      redis:
        condition: service_healthy
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  redis_data:
  whisper_cache:
  huggingface_cache:
